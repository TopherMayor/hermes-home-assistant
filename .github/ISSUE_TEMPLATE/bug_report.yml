name: Bug Report

description: Report something that's broken or not working as expected.

labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out as much detail as possible.

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant Version
      description: "e.g. 2025.6.0"
      placeholder: "2025.6.0"
    validations:
      required: true

  - type: input
    id: hermes_version
    attributes:
      label: Hermes Version
      description: "e.g. 1.2.3 or 'latest'"
      placeholder: "latest"
    validations:
      required: true

  - type: dropdown
    id: installation_method
    attributes:
      label: Installation Method
      options:
        - Manual (copied to custom_components)
        - HACS
        - Development build
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of what goes wrong.
      placeholder: |
        Steps to reproduce:
        1. Go to '...'
        2. Click on '...'
        3. See error

        Expected behavior:
        - What should happen

        Actual behavior:
        - What actually happens
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: "Paste any error messages from Settings → System → Logs (search for 'hermes_assistant')"
      placeholder: |
        2026-05-29 12:00:00 ERROR (MainThread) [custom_components.hermes_assistant] ...
    validations:
      required: false

  - type: input
    id: geforce
    attributes:
      label: Hermes Gateway URL
      description: "e.g. http://192.168.1.100:8642"
      placeholder: "http://localhost:8642"
    validations:
      required: false